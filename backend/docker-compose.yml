version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: fw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fw_password}
      POSTGRES_DB: ${POSTGRES_DB:-financial_wisdom}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fw_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fw_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fw_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fw_user}:${POSTGRES_PASSWORD:-fw_password}@db:5432/${POSTGRES_DB:-financial_wisdom}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION_supersecretkey}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EMAILS_ENABLED: "true"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: financial.wisdom.auth@gmail.com
      SMTP_PASSWORD: "hmwb jiym uzwx mdpl"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # hot-reload in dev

volumes:
  postgres_data:
